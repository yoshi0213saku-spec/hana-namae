<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIお花の名前を調べる</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #fdf6f9;
        }
        .flower-gradient {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }
        .loader {
            border-top-color: #ff9a9e;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen text-gray-800">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl overflow-hidden flex flex-col">
        <!-- Header -->
        <header class="flower-gradient p-6 text-white text-center shadow-md">
            <h1 class="text-2xl font-bold mb-1"><i class="fas fa-seedling mr-2"></i>AI お花の名前を調べる</h1>
            <p class="text-sm opacity-90">写真を撮ってお花の生態を知ろう</p>
        </header>

        <!-- Main Content -->
        <main class="flex-grow p-6 flex flex-col items-center">
            
            <!-- Preview Area -->
            <div id="preview-container" class="w-full aspect-square bg-gray-100 rounded-2xl border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden mb-6 relative">
                <video id="camera-feed" class="hidden w-full h-full object-cover" playsinline></video>
                <img id="image-preview" class="hidden w-full h-full object-cover">
                <div id="placeholder" class="text-center p-4">
                    <i class="fas fa-camera text-4xl text-gray-300 mb-2"></i>
                    <p class="text-gray-400 text-sm">カメラで撮るか、画像を選んでください</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="w-full grid grid-cols-2 gap-4 mb-6">
                <button id="btn-camera" class="bg-pink-50 text-pink-600 font-bold py-3 px-4 rounded-xl border border-pink-200 hover:bg-pink-100 transition flex flex-col items-center">
                    <i class="fas fa-camera mb-1 text-xl"></i>
                    <span id="camera-btn-text" class="text-xs">カメラを起動</span>
                </button>
                <button id="btn-upload" class="bg-green-50 text-green-600 font-bold py-3 px-4 rounded-xl border border-green-200 hover:bg-green-100 transition flex flex-col items-center">
                    <i class="fas fa-image mb-1 text-xl"></i>
                    <span class="text-xs">写真を選択</span>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>

            <button id="btn-analyze" disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed mb-4">
                <i class="fas fa-wand-magic-sparkles mr-2"></i>AIでお花を鑑定する
            </button>

            <!-- Results Section -->
            <div id="loading" class="hidden flex flex-col items-center py-8">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-pink-500 font-medium">お花を解析中です...</p>
            </div>

            <div id="result-card" class="hidden w-full bg-white border border-pink-100 rounded-2xl p-5 shadow-sm space-y-4">
                <div class="border-b border-pink-50 pb-3">
                    <h2 id="res-name" class="text-2xl font-bold text-pink-600">--</h2>
                    <p id="res-scientific" class="text-sm italic text-gray-500">--</p>
                </div>
                
                <div class="space-y-3">
                    <div class="flex items-start space-x-3">
                        <div class="bg-pink-100 p-2 rounded-lg text-pink-500"><i class="fas fa-comment-dots"></i></div>
                        <div>
                            <h3 class="font-bold text-sm text-gray-700">花言葉</h3>
                            <p id="res-language" class="text-sm text-gray-600">--</p>
                        </div>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-green-100 p-2 rounded-lg text-green-600"><i class="fas fa-leaf"></i></div>
                        <div>
                            <h3 class="font-bold text-sm text-gray-700">生態・特徴</h3>
                            <p id="res-ecology" class="text-sm text-gray-600 leading-relaxed">--</p>
                        </div>
                    </div>
                    <div class="flex items-start space-x-3">
                        <div class="bg-blue-100 p-2 rounded-lg text-blue-600"><i class="fas fa-hand-holding-heart"></i></div>
                        <div>
                            <h3 class="font-bold text-sm text-gray-700">育て方のヒント</h3>
                            <p id="res-tips" class="text-sm text-gray-600">--</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="error-message" class="hidden w-full p-4 bg-red-50 text-red-600 rounded-xl text-xs border border-red-100 mt-4"></div>
        </main>

        <footer class="p-4 text-center text-gray-400 text-xs mt-auto">
            Powered by Gemini 2.5 Flash
        </footer>
    </div>

    <!-- Hidden canvas for processing images -->
    <canvas id="process-canvas" class="hidden"></canvas>

    <script>
        // API Key is automatically handled by the environment when defined as an empty string
        const apiKey = "";
        
        const btnCamera = document.getElementById('btn-camera');
        const cameraBtnText = document.getElementById('camera-btn-text');
        const btnUpload = document.getElementById('btn-upload');
        const btnAnalyze = document.getElementById('btn-analyze');
        const fileInput = document.getElementById('file-input');
        const video = document.getElementById('camera-feed');
        const imagePreview = document.getElementById('image-preview');
        const placeholder = document.getElementById('placeholder');
        const canvas = document.getElementById('process-canvas');
        const loading = document.getElementById('loading');
        const resultCard = document.getElementById('result-card');
        const errorMessage = document.getElementById('error-message');

        let selectedImageBase64 = null;
        let isCameraActive = false;

        function resetUI() {
            resultCard.classList.add('hidden');
            errorMessage.classList.add('hidden');
            loading.classList.add('hidden');
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.play();
                video.classList.remove('hidden');
                imagePreview.classList.add('hidden');
                placeholder.classList.add('hidden');
                cameraBtnText.textContent = '撮影する';
                isCameraActive = true;
                btnAnalyze.disabled = true;
            } catch (err) {
                showError("カメラへのアクセスを許可してください。");
            }
        }

        function capturePhoto() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            // Standardizing to JPEG and reasonable quality
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            selectedImageBase64 = dataUrl.split(',')[1];
            
            imagePreview.src = dataUrl;
            imagePreview.classList.remove('hidden');
            video.classList.add('hidden');
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            isCameraActive = false;
            cameraBtnText.textContent = 'カメラを起動';
            btnAnalyze.disabled = false;
            btnAnalyze.classList.replace('bg-gray-400', 'bg-pink-500');
        }

        btnCamera.onclick = () => {
            resetUI();
            if (isCameraActive) capturePhoto(); else startCamera();
        };

        btnUpload.onclick = () => {
            resetUI();
            if (isCameraActive && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.classList.add('hidden');
                isCameraActive = false;
                cameraBtnText.textContent = 'カメラを起動';
            }
            fileInput.click();
        };

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const maxDim = 800; // Limit size for stable API call
                    let w = img.width, h = img.height;
                    if (w > maxDim || h > maxDim) {
                        const ratio = Math.min(maxDim / w, maxDim / h);
                        w *= ratio; h *= ratio;
                    }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    selectedImageBase64 = dataUrl.split(',')[1];
                    imagePreview.src = dataUrl;
                    imagePreview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    btnAnalyze.disabled = false;
                    btnAnalyze.classList.replace('bg-gray-400', 'bg-pink-500');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        async function analyzeFlowerAPI(base64Data, retries = 0) {
            // Simplified prompt structure for maximum compatibility
            const promptText = `あなたは植物学者です。この画像のお花を鑑定してください。回答は必ず以下のJSON形式のみで返してください：
            {"name": "お花の名前", "scientificName": "学名", "languageOfFlowers": "花言葉", "ecology": "生態や特徴", "careTips": "育て方のヒント"}`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                            ]
                        }],
                        generationConfig: {
                            responseMimeType: "application/json"
                        }
                    })
                });

                if (!response.ok) {
                    if (response.status === 429 && retries < 5) {
                        await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                        return analyzeFlowerAPI(base64Data, retries + 1);
                    }
                    const errorJson = await response.json().catch(() => ({}));
                    throw new Error(errorJson.error?.message || `API Error ${response.status}`);
                }

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("AIからの回答がありませんでした。");
                return JSON.parse(text);

            } catch (err) {
                if (retries >= 5) throw err;
                throw err;
            }
        }

        btnAnalyze.onclick = async () => {
            if (!selectedImageBase64) return;
            resetUI();
            loading.classList.remove('hidden');
            btnAnalyze.disabled = true;

            try {
                const result = await analyzeFlowerAPI(selectedImageBase64);
                document.getElementById('res-name').textContent = result.name || "不明";
                document.getElementById('res-scientific').textContent = result.scientificName || "";
                document.getElementById('res-language').textContent = result.languageOfFlowers || "不明";
                document.getElementById('res-ecology').textContent = result.ecology || "情報がありません。";
                document.getElementById('res-tips').textContent = result.careTips || "情報がありません。";
                resultCard.classList.remove('hidden');
                resultCard.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                showError(`鑑定に失敗しました。時間をおいて再度お試しください。\n(${err.message})`);
            } finally {
                loading.classList.add('hidden');
                btnAnalyze.disabled = false;
            }
        };

        function showError(msg) {
            errorMessage.innerHTML = `<i class="fas fa-exclamation-triangle mr-1"></i>${msg}`;
            errorMessage.classList.remove('hidden');
        }
    </script>
</body>
</html>
